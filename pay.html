<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:20px;
border-radius:15px;
width:320px;
text-align:center;
}

.price{
color:#22c55e;
font-size:20px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
margin-top:10px;
cursor:pointer;
}

p{margin:8px 0}
.copy{
color:#22c55e;
cursor:pointer;
}
.warning{
font-size:13px;
color:#fbbf24;
}
</style>
</head>

<body>

<div class="box">
<h2>Thanh toán</h2>

<p><b>Gói:</b> <span id="product"></span></p>
<p class="price"><span id="price"></span>đ</p>

<p><b>MB Bank</b></p>

<p><b>STK:</b></p>
<p onclick="copy('0588807300000')" class="copy">
0588807300000 (bấm để copy)
</p>

<p><b>Chủ TK:</b> Cao Minh Duy</p>

<p><b>Nội dung:</b></p>
<p id="nd" onclick="copyND()" class="copy"></p>

<p class="warning">
⚠️ Để lại số điện thoại của bạn sau nội dung bank chính
</p>

<button onclick="paid()">Tôi đã thanh toán</button>
</div>

<script>
// lấy dữ liệu từ localStorage
document.getElementById("product").innerText =
localStorage.getItem("product") || "Không có";

document.getElementById("price").innerText =
localStorage.getItem("price") || "0";

// tạo nội dung chuyển khoản
let nd = "MDUYK" + Math.floor(100000 + Math.random() * 900000);
document.getElementById("nd").innerText = nd;

// copy STK
function copy(text){
navigator.clipboard.writeText(text);
alert("📋 Đã copy!");
}

// copy nội dung
function copyND(){
navigator.clipboard.writeText(nd);
alert("📋 Đã copy nội dung!");
}

// 👉 FIX: bấm là chuyển sang Zalo
function paid(){
window.location.href = "https://zalo.me/0328033706";
}
</script>

</body>
</html>
